<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Задание на перекрытие газопровода</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .card-header {
            background: #1e3a5f;
            color: white;
            padding: 20px 24px;
        }
        .card-header h1 {
            margin: 0;
            font-size: 1.6rem;
        }
        .card-header p {
            margin: 8px 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        .form-section, .result-section {
            padding: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e3a5f;
        }
        select, button {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border-radius: 14px;
            border: 1px solid #ccc;
            background: white;
            font-family: inherit;
        }
        button {
            background: #1e3a5f;
            color: white;
            font-weight: bold;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            background: #0f2a44;
            transform: scale(0.98);
        }
        .result-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
            border-left: 5px solid #1e3a5f;
        }
        .result-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: #1e3a5f;
        }
        .material-list, .equipment-list {
            margin: 10px 0;
            padding-left: 20px;
        }
        .material-list li, .equipment-list li {
            margin: 6px 0;
        }
        .badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 12px;
        }
        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #cbd5e1;
        }
        .copy-btn {
            background: #2c6e2c;
            margin-top: 12px;
        }
        .copy-btn:active {
            background: #1e4f1e;
        }
        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #5a6874;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>📋 Задание на перекрытие</h1>
            <p>Выберите параметры работы</p>
        </div>
        <div class="form-section">
            <div class="form-group">
                <label>🔧 Тип трубы</label>
                <select id="pipeType">
                    <option value="steel">Сталь (Ду)</option>
                    <option value="pe">ПЭ (полиэтилен)</option>
                </select>
            </div>
            <div class="form-group">
                <label>📏 Диаметр газопровода (мм)</label>
                <select id="diameter">
                    <option value="50">50 мм (сталь)</option>
                    <option value="80">80 мм (сталь)</option>
                    <option value="100">100 мм (сталь)</option>
                    <option value="150">150 мм (сталь)</option>
                    <option value="200" selected>200 мм (сталь)</option>
                    <option value="250">250 мм (сталь)</option>
                    <option value="300">300 мм (сталь)</option>
                    <option value="350">350 мм (сталь)</option>
                    <option value="400">400 мм (сталь)</option>
                    <option value="500">500 мм (сталь)</option>
                    <option value="110">110 мм (ПЭ)</option>
                    <option value="160">160 мм (ПЭ)</option>
                    <option value="225">225 мм (ПЭ)</option>
                    <option value="315">315 мм (ПЭ)</option>
                </select>
            </div>
            <div class="form-group">
                <label>🔄 Тип перекрытия</label>
                <select id="type">
                    <option value="single">Одинарное (1-стороннее)</option>
                    <option value="double" selected>Двойное (2-стороннее)</option>
                </select>
            </div>
            <div class="form-group">
                <label>🔁 Байпас (обводная линия)</label>
                <select id="bypass">
                    <option value="0">Нет байпаса</option>
                    <option value="50">Ду 50 мм</option>
                    <option value="100">Ду 100 мм</option>
                    <option value="200">Ду 200 мм</option>
                    <option value="300">Ду 300 мм</option>
                </select>
            </div>
            <button id="generateBtn">🛠 Сформировать задание</button>
        </div>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <div class="card-header" style="background: #2c6e2c;">
            <h2>✅ Задание мастеру</h2>
        </div>
        <div class="result-section" id="resultContent">
            <!-- сюда будет вставлен результат -->
        </div>
    </div>
    <div class="footer">
        Система формирования задания | Перекрытие газопроводов
    </div>
</div>

<script>
    // ==================================================
    // ПРАВИЛА РАСЧЁТА МАТЕРИАЛОВ
    // ==================================================
    function getMaterials(pipeType, diameter, type, bypass) {
        const isDouble = (type === 'double');
        const coef = isDouble ? 2 : 1;
        const mats = {};
        
        // ===== СТАЛЬНЫЕ ТРУБЫ =====
        if (pipeType === 'steel') {
            if (diameter === 50) {
                mats['фитинг 50'] = 2 * coef;
                mats['манжета 50'] = 1 * coef;
            }
            else if (diameter === 80) {
                mats['фитинг 80'] = 1 * coef;
                mats['фитинг 50'] = 1 * coef;
                mats['манжета 80'] = 1 * coef;
            }
            else if (diameter === 100) {
                mats['фитинг 100'] = 1 * coef;
                mats['фитинг 50'] = 1 * coef;
                mats['манжета 100'] = 1 * coef;
            }
            else if (diameter === 150) {
                mats['фитинг 100'] = 1 * coef;
                mats['фитинг 50'] = 1 * coef;
                mats['манжета 150'] = 1 * coef;
            }
            else if (diameter === 200) {
                mats['фитинг 200'] = 1 * coef;
                mats['фитинг 50'] = 1 * coef;
                mats['манжета 200'] = 1 * coef;
            }
            else if (diameter === 250) {
                mats['фитинг 200'] = 1 * coef;
                mats['фитинг 50'] = 1 * coef;
                mats['манжета 250'] = 1 * coef;
            }
            else if (diameter === 300) {
                mats['фитинг 200'] = 1 * coef;
                mats['фитинг 50'] = 1 * coef;
                mats['манжета 300'] = 1 * coef;
            }
            else if (diameter === 350) {
                mats['фитинг 300'] = 1 * coef;
                mats['фитинг 200'] = 1 * coef;
                mats['манжета 350'] = 1 * coef;
            }
            else if (diameter === 400) {
                mats['фитинг 300'] = 1 * coef;
                mats['фитинг 200'] = 1 * coef;
                mats['манжета 400'] = 1 * coef;
            }
            else if (diameter === 500) {
                mats['фитинг 300'] = 2 * coef;
                mats['манжета 500'] = 1 * coef;
            }
            
            if (isDouble && bypass > 0) {
                const bypassKey = `фитинг ${bypass}`;
                mats[bypassKey] = (mats[bypassKey] || 0) + 2;
            }
        }
        
        // ===== ПЭ ТРУБЫ =====
        else if (pipeType === 'pe') {
            if (diameter === 110) {
                mats['фитинг 110'] = 1 * coef;
                mats['фитинг 75'] = 1 * coef;
            }
            else if (diameter === 160) {
                mats['фитинг 160'] = 1 * coef;
                mats['фитинг 75'] = 1 * coef;
            }
            else if (diameter === 225) {
                mats['фитинг 225'] = 1 * coef;
                mats['фитинг 75'] = 1 * coef;
            }
            else if (diameter === 315) {
                mats['фитинг 315'] = 1 * coef;
                mats['фитинг 75'] = 1 * coef;
            }
            
            if (isDouble && bypass === 50) {
                mats['фитинг 50'] = (mats['фитинг 50'] || 0) + 2;
            }
        }
        
        return mats;
    }
    
    // ==================================================
    // ОБОРУДОВАНИЕ ДЛЯ СТАЛЬНЫХ ТРУБ
    // ==================================================

        }
        else if (diameter === 80) {
            equip.push('Сэндвич задвижка 80 — 1 шт');

            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push('Держатель фрезы Ду 80 с направляющим сверлом — 1 шт');
            equip.push('Держатель фрезы Ду 50 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса Ду 50 — 1 шт');
        }
        else if (diameter === 100) {
            equip.push('Сэндвич задвижка 100 — 1 шт');

            equip.push('Механизм для перекрытия Ду 100 — 1 шт');
            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push('Держатель фрезы Ду 50 с направляющим сверлом — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 100 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса Ду 50 — 1 шт');
        }
        else if (diameter === 150) {
            equip.push('Сэндвич задвижка 100 — 1 шт');
            equip.push('Сэндвич задвижка 50 — 1 шт');
            equip.push('Механизм для перекрытия Ду 150 — 1 шт');
            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push('Держатель фрезы Ду 50 с направляющим сверлом — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 150 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса Ду 50 — 1 шт');
        }
        else if (diameter === 200) {
            equip.push('Сэндвич задвижка 200 — 1 шт');
            equip.push('Сэндвич задвижка 50 — 1 шт');
            equip.push('Механизм для перекрытия Ду 200 — 1 шт');
            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push('Держатель фрезы Ду 50 с направляющим сверлом — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 200 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса Ду 50 — 1 шт');
        }
        else if (diameter === 250) {
            equip.push('Сэндвич задвижка 200 — 1 шт');
            equip.push('Сэндвич задвижка 50 — 1 шт');

            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push('Держатель фрезы Ду 50 с направляющим сверлом — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 200 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса Ду 50 — 1 шт');
        }
        else if (diameter === 300) {
            equip.push('Сэндвич задвижка 200 — 1 шт');
            equip.push('Сэндвич задвижка 50 — 1 шт');
            equip.push('Механизм для перекрытия Ду 300 — 1 шт');
            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push('Держатель фрезы Ду 50 с направляющим сверлом — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 200 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса Ду 50 — 1 шт');
        }
        else if (diameter === 350) {
            equip.push('Сэндвич задвижка 300 — 1 шт');
            equip.push('Сэндвич задвижка 200 — 1 шт');
            equip.push('Механизм для перекрытия фолдинг Ду 350 — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 300 с направляющим сверлом — 1 шт');
            equip.push('Держатель фрезы Ду 200 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса с переходом на 200 Ду 80 — 1 шт');
        }
        else if (diameter === 400) {
            equip.push('Сэндвич задвижка 300 — 1 шт');
            equip.push('Сэндвич задвижка 200 — 1 шт');
            equip.push('Механизм для перекрытия фолдинг Ду 400 — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 300 с направляющим сверлом — 1 шт');
            equip.push('Держатель фрезы Ду 200 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса с переходом на 200 Ду 100 — 1 шт');
        }
        else if (diameter === 500) {
            equip.push('Сэндвич задвижка 300 — 2 шт');
            equip.push('Механизм для перекрытия фолдинг Ду 500 — 1 шт');
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push('Держатель фрезы Ду 300 с направляющим сверлом — 1 шт');
            equip.push('Свеча для сброса с переходом на 300 Ду 100 — 1 шт');
        }
        
        // ==========================================
        // БАЙПАС (дополнительное оборудование)
        // ==========================================
        if (isDouble && bypass > 0) {
            equip.push(`Переходник / тройник на байпас ${bypass} мм — 1 компл`);

        return equip;

    // ==================================================
    // ОБОРУДОВАНИЕ ДЛЯ ПЭ ТРУБ
    // ==================================================

        const equip = [];
        
        if (diameter === 110) {
            equip.push('Задвижка универсальная с подкладными кольцами Ду 110 — 1 шт');
            equip.push('Сэндвич задвижка Ду 80 — 1 шт');
            equip.push('Механизм для перекрытия Ду 110 — 1 шт');
            equip.push('Механизм для сверления ПЭ труб Ду 110 с фрезой и направляющим сверлом — 1 шт');

    // ==================================================
    // СРЕДСТВА ИНДИВИДУАЛЬНОЙ ЗАЩИТЫ (СИЗ)
    // ==================================================
    function getSiz() {
        return [
            'Газоанализатор — 1 шт',
            'Каска защитная — 1 шт',
            'Жилет сигнальный — 1 шт',
            'Привязь страховочная — 1 шт',
            'Очки защитные — 1 шт',
            'Перчатки — 1 пара'
        ];
    }
    
    // ==================================================
    // ДОКУМЕНТАЦИЯ
    // ==================================================
    function getDocs() {
        return [
            '📄 Наряд-допуск',
            '📄 План производства работ (ППР)',
            '📄 Справка с эскизом',
            '📄 Паспорта на фитинги'
        ];
    }
    
    // ==================================================
    // ФОРМИРОВАНИЕ ИТОГОВОГО ЗАДАНИЯ
    // ==================================================
    function formatTask() {
        const pipeType = document.getElementById('pipeType').value;
        const diameter = parseInt(document.getElementById('diameter').value);
        const type = document.getElementById('type').value;
        const bypass = parseInt(document.getElementById('bypass').value);
        
        const isDouble = (type === 'double');
        const pipeTypeText = (pipeType === 'steel') ? 'Сталь (Ду)' : 'ПЭ (полиэтилен)';
        const typeText = isDouble ? 'двойное (2-стороннее)' : 'одинарное (1-стороннее)';
        const bypassText = (bypass === 0) ? 'нет' : `Ду ${bypass} мм`;
        
        const materials = getMaterials(pipeType, diameter, type, bypass);
        const equipment = (pipeType === 'steel') 
            ? getSteelEquipment(diameter, isDouble, bypass)
            : getPeEquipment(diameter, isDouble, bypass);
        const sizList = getSiz();
        const docsList = getDocs();
        
        const now = new Date();
        const dateStr = now.toLocaleDateString('ru-RU');
        const taskNumber = Math.floor(Math.random() * 9000 + 1000);
        
        let html = `
            <div class="result-card">
                <div class="badge">Задание № ${taskNumber} от ${dateStr}</div>
                <div class="result-title">📍 Параметры работы</div>
                <ul style="margin-top:0; padding-left:20px;">
                    <li><strong>Тип трубы:</strong> ${pipeTypeText}</li>
                    <li><strong>Диаметр:</strong> ${diameter} мм</li>
                    <li><strong>Тип перекрытия:</strong> ${typeText}</li>
                    <li><strong>Байпас:</strong> ${bypassText}</li>
                </ul>
                <hr>
                <div class="result-title">📦 МАТЕРИАЛЫ</div>
                <ul class="material-list">
        `;
        
        for (const [name, qty] of Object.entries(materials)) {
            html += `<li>${name} — ${qty} шт</li>`;
        }
        if (Object.keys(materials).length === 0) {
            html += `<li>⚠️ Материалы не требуются</li>`;
        }
        
        html += `
                </ul>
                <hr>
                <div class="result-title">🛠 ОБОРУДОВАНИЕ / ОСНАСТКА</div>
                <ul class="equipment-list">
        `;
        
        for (const item of equipment) {
            html += `<li>${item}</li>`;
        }
        
        html += `
                </ul>
                <hr>
                <div class="result-title">📄 ДОКУМЕНТАЦИЯ</div>
                <ul class="equipment-list">
        `;
        for (const doc of docsList) {
            html += `<li>${doc}</li>`;
        }
        
        html += `
                </ul>
                <hr>
                <div class="result-title">⚠️ СРЕДСТВА ИНДИВИДУАЛЬНОЙ ЗАЩИТЫ (СИЗ)</div>
                <ul class="equipment-list">
        `;
        for (const siz of sizList) {
            html += `<li>${siz}</li>`;
        }
        
        html += `
                </ul>
                <button class="copy-btn" id="copyTaskBtn">📋 Скопировать задание</button>
            </div>
        `;
        
        return html;
    }
    
    // ==================================================
    // ЗАПУСК И КОПИРОВАНИЕ
    // ==================================================
    document.getElementById('generateBtn').addEventListener('click', function() {
        const resultHtml = formatTask();
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');
        resultContent.innerHTML = resultHtml;
        resultCard.style.display = 'block';
        
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        
        setTimeout(() => {
            const copyBtn = document.getElementById('copyTaskBtn');
            if (copyBtn) {
                copyBtn.addEventListener('click', function() {
                    const taskText = document.getElementById('resultContent').innerText;
                    navigator.clipboard.writeText(taskText).then(() => {
                        const originalText = copyBtn.innerText;
                        copyBtn.innerText = '✅ Скопировано!';
                        setTimeout(() => {
                            copyBtn.innerText = originalText;
                        }, 2000);
                    }).catch(() => {
                        alert('Не удалось скопировать. Выделите текст вручную.');
                    });
                });
            }
        }, 100);
    });
    
    document.getElementById('pipeType').addEventListener('change', function() {
        const pipeType = this.value;
        const diamSelect = document.getElementById('diameter');
        diamSelect.innerHTML = '';
        
        if (pipeType === 'steel') {
            diamSelect.innerHTML = `
                <option value="50">50 мм (сталь)</option>
                <option value="80">80 мм (сталь)</option>
                <option value="100">100 мм (сталь)</option>
                <option value="150">150 мм (сталь)</option>
                <option value="200" selected>200 мм (сталь)</option>
                <option value="250">250 мм (сталь)</option>
                <option value="300">300 мм (сталь)</option>
                <option value="350">350 мм (сталь)</option>
                <option value="400">400 мм (сталь)</option>
                <option value="500">500 мм (сталь)</option>
            `;
        } else {
            diamSelect.innerHTML = `
                <option value="110" selected>110 мм (ПЭ)</option>
                <option value="160">160 мм (ПЭ)</option>
                <option value="225">225 мм (ПЭ)</option>
                <option value="315">315 мм (ПЭ)</option>
            `;
        }
        
        document.getElementById('generateBtn').click();
    });
    
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('generateBtn').click();
    });
</script>
</body>
