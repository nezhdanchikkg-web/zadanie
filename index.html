<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Автоматизированный расчет материалов и оборудования для газопроводов</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: white; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        .card-header { background: #1e3a5f; color: white; padding: 20px 24px; }
        .card-header h1 { margin: 0; font-size: 1.6rem; }
        .card-header p { margin: 8px 0 0; opacity: 0.8; font-size: 0.9rem; }
        .tabs { display: flex; gap: 8px; padding: 16px 24px 0 24px; background: white; }
        .tab-btn { flex: 1; padding: 12px; background: #e2e8f0; border: none; border-radius: 16px 16px 0 0; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: #1e3a5f; color: white; }
        .form-section { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1e3a5f; }
        input, select, button { width: 100%; padding: 14px 16px; font-size: 1rem; border-radius: 14px; border: 1px solid #ccc; background: white; font-family: inherit; }
        button { background: #1e3a5f; color: white; font-weight: bold; border: none; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        button:active { background: #0f2a44; transform: scale(0.98); }
        .result-card { background: #f8fafc; border-radius: 20px; padding: 16px; margin-top: 16px; border-left: 5px solid #1e3a5f; }
        .result-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 12px; color: #1e3a5f; }
        .material-list, .equipment-list { margin: 10px 0; padding-left: 20px; }
        .material-list li, .equipment-list li { margin: 6px 0; }
        .badge { background: #e2e8f0; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 12px; }
        hr { margin: 16px 0; border: none; border-top: 1px solid #cbd5e1; }
        .copy-btn { background: #2c6e2c; margin-top: 12px; }
        .calc-block { background: #eef2ff; border-radius: 20px; padding: 16px; margin-top: 20px; }
        .calc-title { font-weight: bold; margin-bottom: 12px; color: #1e3a5f; }
        .calc-result { background: white; padding: 12px; border-radius: 14px; margin-top: 12px; font-weight: bold; }
        .footer { text-align: center; font-size: 0.75rem; color: #5a6874; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>📋 Мастер Калькулятор</h1>
            <p>Автоматизированный расчет материалов и оборудования для газопроводов</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tabOverlap">🔧 Перекрытие</button>
            <button class="tab-btn" id="TabInsert">🔌 Врезка</button>
            <button class="tab-btn" id="TabDrill">🕳️ Сверление</button>
        </div>
        
        <!-- Вкладка Перекрытие -->
        <div id="overlapForm" class="form-section">
            <div class="form-group">
                <label>🔧 Тип трубы</label>
                <select id="pipeType">
                    <option value="steel">Сталь (Ду)</option>
                    <option value="pe">ПЭ (полиэтилен)</option>
                </select>
            </div>
            <div class="form-group">
                <label>📏 Диаметр газопровода (мм)</label>
                <select id="diameter">
                    <option value="50">50 мм (2")</option>
                    <option value="80">80 мм (3")</option>
                    <option value="100">100 мм (4")</option>
                    <option value="150">150 мм (6")</option>
                    <option value="200" selected>200 мм (8")</option>
                    <option value="250">250 мм (10")</option>
                    <option value="300">300 мм (12")</option>
                    <option value="350">350 мм (14")</option>
                    <option value="400">400 мм (16")</option>
                    <option value="500">500 мм (20")</option>
                    <option value="110">110 мм (ПЭ)</option>
                    <option value="160">160 мм (ПЭ)</option>
                    <option value="225">225 мм (ПЭ)</option>
                    <option value="315">315 мм (ПЭ)</option>
                </select>
            </div>
            <div class="form-group">
                <label>🔄 Тип перекрытия</label>
                <select id="type">
                    <option value="single">Одинарное (1-стороннее)</option>
                    <option value="double" selected>Двойное (2-стороннее)</option>
                </select>
            </div>
            <div class="form-group">
                <label>🔁 Байпас (обводная линия)</label>
                <select id="bypass">
                    <option value="0">Нет байпаса</option>
                    <option value="50">Ду 50 мм</option>
                    <option value="100">Ду 100 мм</option>
                    <option value="200">Ду 200 мм</option>
                    <option value="300">Ду 300 мм</option>
                </select>
            </div>
        </div>

        <!-- Вкладка Врезка -->
        <div id="insertForm" class="form-section" style="display: none;">
            <div class="form-group">
                <label>📌 Тип врезки</label>
                <select id="insertType">
                    <option value="simple">Простая врезка (без обрезки)</option>
                    <option value="cut">Врезка с обрезкой</option>
                </select>
            </div>
            <div class="form-group">
                <label>📏 Диаметр газопровода (мм)</label>
                <select id="insertDiameter">
                    <option value="50">50 мм (2")</option>
                    <option value="80">80 мм (3")</option>
                    <option value="100">100 мм (4")</option>
                    <option value="150">150 мм (6")</option>
                    <option value="200" selected>200 мм (8")</option>
                    <option value="250">250 мм (10")</option>
                    <option value="300">300 мм (12")</option>
                    <option value="350">350 мм (14")</option>
                    <option value="400">400 мм (16")</option>
                    <option value="500">500 мм (20")</option>
                </select>
            </div>
        </div>

        <!-- Вкладка Сверление -->
        <div id="drillForm" class="form-section" style="display: none;">
            <div class="calc-block">
                <div class="calc-title">📐 Расчёт дистанции сверления</div>
                <div class="form-group">
                    <label>Наружный диаметр трубы (Pipe OD), мм</label>
                    <input type="number" id="pipeOD" placeholder="219" step="any" value="219">
                </div>
                <div class="form-group">
                    <label>Внутренний диаметр трубы (Pipe ID), мм</label>
                    <input type="number" id="pipeID" placeholder="200" step="any" value="200">
                </div>
                <div class="form-group">
                    <label>Наружный диаметр фрезы (Cutter OD), мм</label>
                    <input type="number" id="cutterOD" placeholder="100" step="any" value="100">
                </div>
                <div class="form-group">
                    <label>Расстояние от кончика фрезы до кончика сверла (ref1), мм</label>
                    <input type="number" id="ref1" placeholder="10" step="any" value="10">
                </div>
                <div class="calc-result" id="drillResult">
                    C₁ = ... мм<br>
                    C = ... мм
                </div>
            </div>
        </div>

        <button id="generateBtn">🛠 Сформировать задание</button>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <div class="card-header" style="background: #2c6e2c;">
            <h2>✅ Задание мастеру</h2>
        </div>
        <div class="result-section" id="resultContent"></div>
    </div>
    <div class="footer">Система формирования задания | Перекрытие / врезка / сверление</div>
</div>

<script>
    // ==================================================
    // РАСЧЁТ ДИСТАНЦИИ СВЕРЛЕНИЯ
    // ==================================================
    function updateDrillCalculation() {
        const od = parseFloat(document.getElementById('pipeOD').value);
        const id = parseFloat(document.getElementById('pipeID').value);
        const cutterOD = parseFloat(document.getElementById('cutterOD').value);
        const ref1 = parseFloat(document.getElementById('ref1').value);
        
        if (isNaN(od) || isNaN(id) || isNaN(cutterOD) || isNaN(ref1)) {
            document.getElementById('drillResult').innerHTML = '⚠️ Введите все числовые значения';
            return;
        }
        if (id >= od) {
            document.getElementById('drillResult').innerHTML = '⚠️ Ошибка: внутренний диаметр не может быть больше или равен наружному';
            return;
        }
        const odHalf = od / 2;
        const idHalf = id / 2;
        const cutterHalf = cutterOD / 2;
        const underRoot = (idHalf * idHalf) - (cutterHalf * cutterHalf);
        if (underRoot < 0) {
            document.getElementById('drillResult').innerHTML = '⚠️ Ошибка: под корнем отрицательное число. Проверьте диаметры.';
            return;
        }
        const c1 = odHalf - Math.sqrt(underRoot);
        const c = c1 + ref1;
        const c1mm = c1.toFixed(2);
        const cmm = c.toFixed(2);
        const c1inch = (c1 / 25.4).toFixed(2);
        const cinch = (c / 25.4).toFixed(2);
        document.getElementById('drillResult').innerHTML = `<strong>📐 Результат расчёта:</strong><br>C₁ = ${c1mm} мм (${c1inch} дюйма)<br>C = ${cmm} мм (${cinch} дюйма)`;
    }

    // ==================================================
    // ФУНКЦИЯ ДЛЯ ПОЛУЧЕНИЯ ДЮЙМОВОГО ОБОЗНАЧЕНИЯ
    // ==================================================
    function getInchLabel(mm) {
        const inches = {
            50: '2"', 80: '3"', 100: '4"', 150: '6"', 200: '8"', 250: '10"', 300: '12"', 350: '14"', 400: '16"', 500: '20"'
        };
        return inches[mm] || '';
    }

    // ==================================================
    // ФУНКЦИЯ ДЛЯ ПОЛУЧЕНИЯ ФАКТИЧЕСКОГО ДИАМЕТРА ФРЕЗЫ
    // ==================================================
    function getCutterActual(diameter) {
        const cutters = {
            50: 48, 80: 73, 100: 98, 102: 95, 150: 148, 200: 198, 250: 248, 300: 298, 350: 348, 400: 398, 500: 498
        };
        return cutters[diameter] || diameter;
    }

    // ==================================================
    // МАТЕРИАЛЫ (СТАЛЬ + ПЭ)
    // ==================================================
    function getMaterials(pipeType, diameter, type, bypass) {
        const isDouble = (type === 'double');
        const coef = isDouble ? 2 : 1;
        const mats = {};
        if (pipeType === 'steel') {
            if (diameter === 50) { mats['фитинг 50'] = 2 * coef; mats['манжета 50'] = 1 * coef; }
            else if (diameter === 80) { mats['фитинг 80'] = 1 * coef; mats['фитинг 50'] = 1 * coef; mats['манжета 80'] = 1 * coef; }
            else if (diameter === 100) { mats['фитинг 100'] = 1 * coef; mats['фитинг 50'] = 1 * coef; mats['манжета 100'] = 1 * coef; }
            else if (diameter === 150) { mats['фитинг 100'] = 1 * coef; mats['фитинг 50'] = 1 * coef; mats['манжета 150'] = 1 * coef; }
            else if (diameter === 200) { mats['фитинг 200'] = 1 * coef; mats['фитинг 50'] = 1 * coef; mats['манжета 200'] = 1 * coef; }
            else if (diameter === 250) { mats['фитинг 200'] = 1 * coef; mats['фитинг 50'] = 1 * coef; mats['манжета 250'] = 1 * coef; }
            else if (diameter === 300) { mats['фитинг 200'] = 1 * coef; mats['фитинг 50'] = 1 * coef; mats['манжета 300'] = 1 * coef; }
            else if (diameter === 350) { mats['фитинг 300'] = 1 * coef; mats['фитинг 200'] = 1 * coef; mats['манжета 350'] = 1 * coef; }
            else if (diameter === 400) { mats['фитинг 300'] = 1 * coef; mats['фитинг 200'] = 1 * coef; mats['манжета 400'] = 1 * coef; }
            else if (diameter === 500) { mats['фитинг 300'] = 2 * coef; mats['манжета 500'] = 1 * coef; }
            if (isDouble && bypass > 0) mats[`фитинг ${bypass}`] = (mats[`фитинг ${bypass}`] || 0) + 2;
        }
        else if (pipeType === 'pe') {
            if (diameter === 110) { mats['фитинг 110'] = 1 * coef; mats['фитинг 75'] = 1 * coef; }
            else if (diameter === 160) { mats['фитинг 160'] = 1 * coef; mats['фитинг 75'] = 1 * coef; }
            else if (diameter === 225) { mats['фитинг 225'] = 1 * coef; mats['фитинг 75'] = 1 * coef; }
            else if (diameter === 315) { mats['фитинг 315'] = 1 * coef; mats['фитинг 75'] = 1 * coef; }
            if (isDouble && bypass === 50) mats['фитинг 50'] = (mats['фитинг 50'] || 0) + 2;
        }
        return mats;
    }

    // ==================================================
    // ОБОРУДОВАНИЕ ДЛЯ СТАЛИ
    // ==================================================
    function getSteelEquipment(diameter, isDouble, bypass) {

        }

            equip.push(`Сэндвич задвижка 50 — ${1 * coef} шт`);
            equip.push(`Механизм для перекрытия Ду 100 — ${1 * coef} шт`);
            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push(`Держатель фрезы Ду 50 (48) с направляющим сверлом — 1 шт`);
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push(`Держатель фрезы Ду 100 (98) с направляющим сверлом — 1 шт`);
            equip.push(`Свеча для сброса Ду 50 — ${1 * coef} шт`);
        }
        else if (diameter === 150) {
            equip.push(`Сэндвич задвижка 100 — ${1 * coef} шт`);
            equip.push(`Сэндвич задвижка 50 — ${1 * coef} шт`);
            equip.push(`Механизм для перекрытия Ду 150 — ${1 * coef} шт`);
            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push(`Держатель фрезы Ду 50 (48) с направляющим сверлом — 1 шт`);
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push(`Держатель фрезы Ду 150 (148) с направляющим сверлом — 1 шт`);
            equip.push(`Свеча для сброса Ду 50 — ${1 * coef} шт`);
        }
        else if (diameter === 200) {
            equip.push(`Сэндвич задвижка 200 — ${1 * coef} шт`);
            equip.push(`Сэндвич задвижка 50 — ${1 * coef} шт`);
            equip.push(`Механизм для перекрытия Ду 200 — ${1 * coef} шт`);
            equip.push('Машинка для сверления Т-101 — 1 шт');
            equip.push(`Держатель фрезы Ду 50 (48) с направляющим сверлом — 1 шт`);
            equip.push('Машинка для сверления Т-203 — 1 шт');
            equip.push(`Держатель фрезы Ду 200 (198) с направляющим сверлом — 1 шт`);
            equip.push(`Свеча для сброса Ду 50 — ${1 * coef} шт`);
        }
        else if (diameter === 250) {
            equip.push(`Сэндвич задвижка 200 — ${1 * coef} шт`);
            equip.push(`Сэндвич задвижка 50 — ${1 * coef} шт`);
            equip.push(`Механизм для перекрытия Ду 250 — ${1 * coef} шт`);

        }
        else if (diameter === 350) {

            equip.push(`Холматр 200/400 — ${1 * coef} шт`);
        }
        else if (diameter === 400) {
            equip.push(`Сэндвич задвижка 300 — ${1 * coef} шт`);

    }

    // ==================================================
    // МАТЕРИАЛЫ ДЛЯ ВРЕЗКИ
    // ==================================================
    function getInsertMaterials(insertType, diameter) {
        const mats = {};
        if (insertType === 'simple') {
            if (diameter === 50) { mats['тройник 50'] = 1; mats['отвод 50'] = 2; }
            else if (diameter === 80) { mats['тройник 80'] = 1; mats['отвод 80'] = 2; }
            else if (diameter === 100) { mats['тройник 100'] = 1; mats['отвод 100'] = 2; }
            else if (diameter === 150) { mats['тройник 150'] = 1; mats['переход 159/168'] = 1; mats['отвод 150'] = 2; }

    function formatTask() {

        if (activeTab === 'tabOverlap') {
            const pipeType = document.getElementById('pipeType').value;
            const diameter = parseInt(document.getElementById('diameter').value);
            const type = document.getElementById('type').value;
            const bypass = parseInt(document.getElementById('bypass').value);
            const isDouble = (type === 'double');
            const inchLabel = getInchLabel(diameter);
            const materials = getMaterials(pipeType, diameter, type, bypass);
            const equipment = getSteelEquipment(diameter, isDouble, bypass);
            const sizList = getSiz(); const docsList = getDocs();
